<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d2d3d">
<title>Valencia · sub-4h</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Puerta / PIN -->
<div id="puerta" class="gate" hidden>
  <div class="gate-status">
    <span id="clock">—</span><span>▮▮▮ · sub-4h</span>
  </div>
  <div class="gate-brand">
    <div class="mark"><span class="tri">▲</span><span>VALENCIA</span></div>
    <h1>Maratón Valencia</h1>
    <p>6 dic 2026 · sub-4h</p>
  </div>
  <div class="gate-pin">
    <div class="pin-lbl">PIN</div>
    <div class="pin-dots" id="pinDots"></div>
    <div class="pin-err" id="msgPin"></div>
    <div class="keypad" id="keypad">
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <span></span><button data-k="0">0</button><button data-k="del" class="del">⌫</button>
    </div>
    <button class="btn-primary gate-enter" id="bEntrar">ENTRAR</button>
    <p class="gate-foot">Roman · 5:41/km · romandev.app</p>
  </div>
</div>

<!-- Panel -->
<div id="app" hidden>
  <header class="appbar">
    <div class="brandmark"><span class="tri">▲</span><b>VALENCIA</b></div>
    <div class="daysbox"><span class="n" id="dleft">—</span><span class="l">DÍAS</span></div>
  </header>

  <main class="view" id="vHoy"></main>
  <main class="view" id="vSemana" hidden></main>
  <main class="view" id="vProg" hidden></main>

  <nav class="tabbar" role="tablist">
    <button id="tHoy" role="tab" aria-selected="true">HOY</button>
    <button id="tSem" role="tab" aria-selected="false">SEMANA</button>
    <button id="tProg" role="tab" aria-selected="false">PROGRESO</button>
  </nav>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
